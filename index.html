<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Bane - Loading System</title>
    <style>
        /* Desactivar scroll y ajustar a pantallas OLED/AMOLED de Samsung */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Entorno 3D */
        }

        /* Contenedor Principal con efecto Flotante 3D */
        .container {
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            animation: float3D 6s ease-in-out infinite;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            z-index: 20;
        }

        /* Título Principal Cyber Bane con Glitch */
        .logo-title {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 
                -3px -3px 0 #ff003c,  /* Rojo Cyber */
                 3px  3px 0 #00d2ff; /* Azul Cyber */
            margin-bottom: 5px;
            position: relative;
            animation: glitch 1s linear infinite;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Contenedor de la Imagen con Efecto 3D Dinámico */
        .image-3d-container {
            width: 100%;
            max-width: 280px; 
            margin: 0 auto 30px auto;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }

        .image-3d-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        /* Contenedor del Efecto de Escritura en Vivo */
        .typing-container {
            min-height: 55px;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .typing-text {
            font-size: 1.1rem;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 1.5;
            display: inline;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }

        /* Cursor de consola parpadeante */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #ff003c;
            margin-left: 5px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            box-shadow: 0 0 8px #ff003c;
        }

        /* Botón estilo Cyberpunk con retraso de aparición progresiva */
        .btn-welcome {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ff003c;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            outline: none;
            overflow: hidden;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
            text-transform: uppercase;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInBtn 1s ease forwards;
            animation-delay: 2.8s; /* Aparece de forma fluida mientras termina de escribir */
        }

        .btn-welcome:hover {
            background: #ff003c;
            color: #000000;
            box-shadow: 0 0 25px #ff003c, 0 0 10px #00d2ff;
            border-color: #00d2ff;
        }

        /* Filtro CRT Scanlines para monitores hacker */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.03), 
                rgba(0, 210, 255, 0.01), 
                rgba(0, 0, 255, 0.03)
            );
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* KEYFRAMES */
        @keyframes float3D {
            0%, 100% { transform: translateY(0) rotateX(4deg) rotateY(-4deg); }
            50% { transform: translateY(-10px) rotateX(-4deg) rotateY(4deg); }
        }

        @keyframes glitch {
            0%, 20%, 25%, 70%, 75%, 100% { text-shadow: -3px -3px 0 #ff003c, 3px 3px 0 #00d2ff; }
            21% { text-shadow: 5px -1px 0 #ff003c, -5px 2px 0 #00d2ff; }
            71% { text-shadow: -4px 3px 0 #ff003c, 4px -3px 0 #00d2ff; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeInBtn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Mobile Responsive (Estricto para pantallas Samsung Galaxy / Ultra) */
        @media (max-width: 768px) {
            .logo-title {
                font-size: 2.4rem;
                letter-spacing: 3px;
            }
            .subtitle {
                font-size: 0.75rem;
            }
            .image-3d-container {
                max-width: 210px;
                margin-bottom: 20px;
            }
            .typing-text {
                font-size: 0.95rem;
            }
            .btn-welcome {
                padding: 14px 20px;
                font-size: 0.95rem;
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="container">
        <h1 class="logo-title">Cyber Bane</h1>
        <div class="subtitle">Secure Network &sdot; System Override</div>

        <div class="image-3d-container" id="image3D">
            <img src="https://i79.servimg.com/u/f79/20/65/01/16/6a889510.jpg" alt="Cyber Bane Hub Image">
        </div>

        <div class="typing-container">
            <span class="typing-text" id="typewriter"></span><span class="cursor"></span>
        </div>

        <button class="btn-welcome" onclick="enterInfra()">
            <span style="color: #00d2ff;">[</span> BIENVENIDO AL INFRAMUNDO <span style="color: #ff003c;">]</span>
        </button>
    </div>

    <script>
        // --- Script Interactividad de Rotación 3D (Mouse/Touch) ---
        const imageContainer = document.getElementById('image3D');
        const constrain = 15; // Suavidad de giro

        function transforms(x, y, el) {
            let box = el.getBoundingClientRect();
            let calcX = -(y - box.y - (box.height / 2)) / constrain;
            let calcY = (x - box.x - (box.width / 2)) / constrain;
            return `rotateX(${calcX}deg) rotateY(${calcY}deg)`;
        }

        function transformElement(el, xyEl) {
            el.style.transform = transforms.apply(null, xyEl);
        }

        // PC Tracking
        document.onmousemove = function(e) {
            let xy = [e.clientX, e.clientY];
            let position = xy.concat([imageContainer]);
            window.requestAnimationFrame(function() {
                transformElement(imageContainer, position);
            });
        };

        // Mobile Tracking (Toque e interacción táctil)
        document.ontouchmove = function(e) {
            let touch = e.touches[0];
            let xy = [touch.clientX, touch.clientY];
            let position = xy.concat([imageContainer]);
            window.requestAnimationFrame(function() {
                transformElement(imageContainer, position);
            });
        };

        // --- Script de Texto Mecanografiado en Vivo ---
        const textToType = "BIENVENID@ A LA CIBERSEGURIDAD: DONDE LOS BLACK HATS NO TIENEN DONDE ESCONDERSE...";
        const typingSpeed = 40; 
        let index = 0;

        function typeEffect() {
            if (index < textToType.length) {
                document.getElementById("typewriter").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeEffect, typingSpeed);
            }
        }

        window.onload = typeEffect;

        // --- Función de Redirección con Animación ---
        function enterInfra() {
            document.body.style.transition = "all 0.5s ease";
            document.body.style.opacity = "0";
            document.body.style.transform = "scale(0.92)";
            
            setTimeout(() => {
                // Redirección directa hacia el archivo de inicio
                window.location.href = "inicio.html";
            }, 500);
        }
    </script>
</body>
</html>
